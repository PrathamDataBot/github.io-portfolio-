(function(){

/* ---------------------------------------------------------------
   0. SAFE STORAGE (works even if storage access is blocked)
--------------------------------------------------------------- */
const store = {
  get(k,d){ try{ const v = localStorage.getItem(k); return v===null?d:JSON.parse(v);}catch(e){return d;} },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
};

/* ---------------------------------------------------------------
   1. PIXEL ART ENGINE — draws sprites from a grid of palette indices
      using stacked box-shadow "pixels". 0 = transparent.
--------------------------------------------------------------- */
function pixelArt(grid, palette, px){
  px = px || 3;
  const shadows = [];
  for(let y=0;y<grid.length;y++){
    const row = grid[y];
    for(let x=0;x<row.length;x++){
      const c = row[x];
      if(c === 0) continue;
      shadows.push(`${x*px}px ${y*px}px 0 ${palette[c]}`);
    }
  }
  return shadows.join(',');
}
function makeSprite(grid,palette,px,size){
  const el = document.createElement('div');
  el.style.width = size+'px'; el.style.height = size+'px'; el.style.position='relative';
  const dot = document.createElement('div');
  dot.style.width = px+'px'; dot.style.height = px+'px'; dot.style.position='absolute'; dot.style.left=0; dot.style.top=0;
  dot.style.boxShadow = pixelArt(grid,palette,px);
  el.appendChild(dot);
  return el;
}

/* ---------------------------------------------------------------
   2. SOUND ENGINE — Web Audio API, no external audio files
--------------------------------------------------------------- */
const Sound = (function(){
  let ctx=null, muted = store.get('pf_muted', false);
  function ensure(){ if(!ctx){ try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; }
  function tone(freq,dur,type,gain,delay){
    if(muted) return; const c = ensure(); if(!c) return;
    const t0 = c.currentTime + (delay||0);
    const osc = c.createOscillator(); const g = c.createGain();
    osc.type = type||'square'; osc.frequency.setValueAtTime(freq,t0);
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(gain||0.06,t0+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    osc.connect(g); g.connect(c.destination); osc.start(t0); osc.stop(t0+dur+0.02);
  }
  return {
    click(){ tone(520,.06,'square',.05); },
    open(){ tone(440,.07,'square',.05); tone(660,.09,'square',.05,.05); },
    close(){ tone(660,.06,'square',.05); tone(340,.09,'square',.05,.04); },
    coin(){ tone(988,.08,'square',.06); tone(1318,.14,'square',.06,.07); },
    notify(){ tone(784,.05,'triangle',.05); tone(988,.09,'triangle',.05,.06); },
    startup(){ [261,329,392,523].forEach((f,i)=>tone(f,.16,'square',.05,i*.12)); },
    achievement(){ [523,659,784,1046].forEach((f,i)=>tone(f,.14,'square',.06,i*.09)); },
    toggleMute(){ muted = !muted; store.set('pf_muted',muted); return muted; },
    isMuted(){ return muted; }
  };
})();

/* ---------------------------------------------------------------
   4. WINDOW MANAGER
--------------------------------------------------------------- */
const WM = (function(){
  let z = 100, openWins = {}, offsetSeed = 0;
  function create(key){
    if(openWins[key] && openWins[key].el){ focus(key); if(openWins[key].el.classList.contains('min')) toggleMin(key); return; }
    const data = CONTENT[key]; if(!data) return;
    const el = document.createElement('div');
    el.className='win'; el.setAttribute('role','dialog'); el.setAttribute('aria-label',data.title);
    offsetSeed = (offsetSeed+1)%6;
    const baseX = 60 + offsetSeed*26, baseY = 56 + offsetSeed*22;
    el.style.left = Math.min(baseX, window.innerWidth-360)+'px';
    el.style.top = baseY+'px';
    el.style.width='420px';
    el.innerHTML = `
      <div class="titlebar" data-drag>
        <span>${data.title}</span><span class="tgrow"></span>
        <button class="min" aria-label="Minimize">_</button>
        <button class="max" aria-label="Maximize">▢</button>
        <button class="close" aria-label="Close">×</button>
      </div>
      <div class="body">${data.html}</div>`;
    document.getElementById('app').appendChild(el);
    openWins[key] = {el, maximized:false, prevRect:null};
    wireWindow(key, el);
    focus(key);
    Sound.open();
  }
  function wireWindow(key, el){
    const bar = el.querySelector('[data-drag]');
    let dragging=false, sx=0, sy=0, ox=0, oy=0;
    bar.addEventListener('mousedown', e=>{
      dragging=true; sx=e.clientX; sy=e.clientY;
      const r = el.getBoundingClientRect(); ox=r.left; oy=r.top; focus(key); e.preventDefault();
    });
    window.addEventListener('mousemove', e=>{
      if(!dragging) return;
      const nx = ox + (e.clientX-sx), ny = Math.max(34,oy + (e.clientY-sy));
      el.style.left = nx+'px'; el.style.top = ny+'px';
    });
    window.addEventListener('mouseup', ()=>{ dragging=false; });
    bar.addEventListener('touchstart', e=>{
      const t=e.touches[0]; dragging=true; sx=t.clientX; sy=t.clientY;
      const r = el.getBoundingClientRect(); ox=r.left; oy=r.top; focus(key);
    },{passive:true});
    bar.addEventListener('touchmove', e=>{
      if(!dragging) return; const t=e.touches[0];
      el.style.left = (ox+(t.clientX-sx))+'px'; el.style.top = Math.max(34,oy+(t.clientY-sy))+'px';
    },{passive:true});
    bar.addEventListener('touchend', ()=>{dragging=false;});
    el.querySelector('.close').addEventListener('click', ()=>{ close(key); });
    el.querySelector('.min').addEventListener('click', ()=>{ toggleMin(key); });
    el.querySelector('.max').addEventListener('click', ()=>{ toggleMax(key); });
    el.addEventListener('mousedown', ()=>focus(key));
  }
  function focus(key){
    Object.keys(openWins).forEach(k=>{ if(openWins[k].el) openWins[k].el.classList.remove('focused'); });
    if(openWins[key] && openWins[key].el){ openWins[key].el.style.zIndex = ++z; openWins[key].el.classList.add('focused'); }
  }
  function close(key){ if(openWins[key]){ openWins[key].el.remove(); delete openWins[key]; Sound.close(); } }
  function toggleMin(key){ const w=openWins[key]; if(!w) return; w.el.classList.toggle('min'); }
  function toggleMax(key){
    const w=openWins[key]; if(!w) return;
    if(!w.maximized){
      w.prevRect = {left:w.el.style.left, top:w.el.style.top, width:w.el.style.width, height:w.el.style.height};
      w.el.style.left='2%'; w.el.style.top='40px'; w.el.style.width='96%'; w.el.style.height='calc(100% - 100px)';
      w.maximized=true;
    } else {
      Object.assign(w.el.style, w.prevRect || {}); w.el.style.height='auto'; w.maximized=false;
    }
  }
  return {create, focus, close};
})();

function buildIcons(){
  const wrap = document.getElementById('icons');
  const mapwrap = document.getElementById('mobilemap');
  ICON_ORDER.forEach(([key,label,glyphKey])=>{
    const btn = document.createElement('button');
    btn.className='icon'; btn.setAttribute('aria-label','Open '+label);
    const glyph = makeSprite(GLYPHS[glyphKey], PALETTES[glyphKey], 3, 36);
    glyph.className='glyph';
    btn.appendChild(glyph);
    const lbl = document.createElement('span'); lbl.className='lbl'; lbl.textContent = label; btn.appendChild(lbl);
    let clicks=0, clickTimer=null;
    function activate(){ Sound.click(); WM.create(key); }
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.icon.selected').forEach(i=>i.classList.remove('selected'));
      btn.classList.add('selected');
      clicks++;
      if(clicks===1){ clickTimer=setTimeout(()=>{clicks=0;},320); }
      else { clearTimeout(clickTimer); clicks=0; activate(); }
    });
    btn.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); activate(); } });
    wrap.appendChild(btn);

    const node = document.createElement('button');
    node.className='mapnode'; node.setAttribute('aria-label','Open '+label);
    const glyph2 = makeSprite(GLYPHS[glyphKey], PALETTES[glyphKey], 3, 34); glyph2.className='glyph';
    node.appendChild(glyph2);
    const lbl2 = document.createElement('span'); lbl2.className='lbl'; lbl2.textContent = label; node.appendChild(lbl2);
    node.addEventListener('click', activate);
    mapwrap.appendChild(node);
  });
}

function buildScenery(){
  const scene = document.getElementById('scene');
  // clouds
  for(let i=0;i<5;i++){
    const c = document.createElement('div'); c.className='cloud pxl';
    const w = 60+Math.random()*40, top = 20+Math.random()*90, dur = 40+Math.random()*30, delay=-Math.random()*dur;
    c.style.width=w+'px'; c.style.height=(w*0.4)+'px'; c.style.top=top+'px'; c.style.left='-120px';
    c.style.animation = `cloudmove ${dur}s linear ${delay}s infinite`;
    scene.appendChild(c);
  }
  const styleTag = document.createElement('style');
  styleTag.textContent = `@keyframes cloudmove{from{transform:translateX(0);}to{transform:translateX(160vw);}}`;
  document.head.appendChild(styleTag);
  // birds
  for(let i=0;i<3;i++){
    const b=document.createElement('div'); b.className='bird';
    b.style.top=(30+Math.random()*60)+'px'; b.style.left='-20px';
    b.innerHTML='<span></span><span></span>';
    b.style.animation = `birdmove ${18+Math.random()*10}s linear ${-Math.random()*20}s infinite`;
    scene.appendChild(b);
  }
  const st2 = document.createElement('style'); st2.textContent = `@keyframes birdmove{from{transform:translateX(0) translateY(0);}50%{transform:translateX(80vw) translateY(-20px);}to{transform:translateX(160vw) translateY(0);}}`;
  document.head.appendChild(st2);
  // hills
  const hillsWrap = document.getElementById('hills');
  [ [0,'220px'], [180,'170px'], [420,'260px'] ].forEach(([left,w],i)=>{
    const h=document.createElement('div'); h.className='hill'; h.style.left=left+'px'; h.style.width=w;
    hillsWrap.appendChild(h);
  });
  // ground decorations
  const decos = [];
  for(let i=0;i<7;i++){
    const x = 40 + i*130;
    if(i%3===0){ decos.push({x, type:'qbox'}); }
    else if(i%3===1){ decos.push({x, type: i===4 ? 'pipe-secret' : 'pipe'}); }
    else { decos.push({x, type:'bush'}); }
  }
  decos.forEach(d=>{
    const el = document.createElement('div'); el.className='deco'; el.style.left=d.x+'px';
    if(d.type==='qbox'){
      el.classList.add('qbox'); el.textContent='?'; el.setAttribute('role','button'); el.tabIndex=0;
      el.setAttribute('aria-label','Question block — bump for a coin');
      el.addEventListener('click', ()=>{
        if(el.classList.contains('spent')) return;
        el.classList.add('spent'); el.textContent='';
        Sound.coin(); updateCoins(1);
        spawnCoinPop(el);
      });
    } else if(d.type==='pipe' || d.type==='pipe-secret'){
      el.classList.add('pipe-deco');
      if(d.type==='pipe-secret'){
        el.classList.add('secret'); el.tabIndex=0; el.setAttribute('role','button');
        el.setAttribute('aria-label','A suspicious pipe...');
        el.addEventListener('click', ()=>{ Sound.notify(); WM.create('secret'); toast('You found the warp pipe! 🟢'); });
      }
    } else {
      el.classList.add('bush');
    }
    scene.appendChild(el);
  });
  function spawnCoinPop(sourceEl){
    const r = sourceEl.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.textContent='+1'; pop.style.position='fixed'; pop.style.left=r.left+'px'; pop.style.top=r.top+'px';
    pop.style.color='#ffd700'; pop.style.fontWeight='bold'; pop.style.fontSize='13px'; pop.style.zIndex=999;
    pop.style.transition='all .7s ease'; document.body.appendChild(pop);
    requestAnimationFrame(()=>{ pop.style.transform='translateY(-30px)'; pop.style.opacity='0'; });
    setTimeout(()=>pop.remove(),750);
  }
}

  hero.addEventListener('click', ()=>{
    const wave=document.createElement('div'); wave.className='wave'; wave.textContent='👋';
    hero.appendChild(wave); Sound.notify();
    setTimeout(()=>wave.remove(),1300);

--------------------------------------------------------------- */
function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = hh+':'+mm;
  const night = d.getHours() >= 19 || d.getHours() < 6;
  document.body.classList.toggle('night', night && store.get('pf_theme','auto')==='auto' ? true : store.get('pf_theme','auto')==='night');
}

/* ---------------------------------------------------------------
   8. EASTER EGGS: Konami code + hidden credits
--------------------------------------------------------------- */
function wireEasterEggs(){
  const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let idx=0;
  window.addEventListener('keydown', e=>{
    const k = e.key.length===1 ? e.key.toLowerCase() : e.key;
    if(k === seq[idx]) idx++; else idx = (k===seq[0]?1:0);
    if(idx === seq.length){ idx=0; konami(); }
  });
  let sunClicks=0;
  document.getElementById('sun').addEventListener('click', ()=>{
    sunClicks++;
    if(sunClicks===5){ WM.create('credits'); toast('Hidden credits unlocked ☀'); Sound.achievement(); sunClicks=0; }
  });
}
function konami(){
  toast('🎉 KONAMI UNLOCKED — enjoy the confetti');
  Sound.achievement();
  for(let i=0;i<40;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left = Math.random()*100+'vw'; c.style.top='-10px';
    c.style.background = ['#e0402a','#f8b800','#00a800','#4a90e2','#ff8fb3'][i%5];
    c.style.animationDuration = (2+Math.random()*2)+'s';
    document.getElementById('app').appendChild(c);
    setTimeout(()=>c.remove(),4200);
  }
}

/* ---------------------------------------------------------------
   9. BOOT SEQUENCE
--------------------------------------------------------------- */
function runBoot(){
  const lines = [
    'PRATHAMESH.OS  v2.6.0',
    'MEM CHECK ....... 640K OK',
    'LOADING GENAI MODULE .... OK',
    'LOADING FORECASTING ENGINE .... OK',
    'MOUNTING PORTFOLIO FILESYSTEM ....',
    'READY.'
  ];
  const linesEl = document.getElementById('bootlines');
  const barEl = document.getElementById('bootbar');
  for(let i=0;i<10;i++){ const b=document.createElement('div'); b.className='block'; barEl.appendChild(b); }
  const blocks = barEl.querySelectorAll('.block');
  let li=0;
  function nextLine(){
    if(li<lines.length){
      const d=document.createElement('div'); d.textContent='> '+lines[li]; d.style.animationDelay='0s';
      linesEl.appendChild(d); li++;
      let bi = Math.floor((li/lines.length)*blocks.length);
      for(let k=0;k<bi;k++) blocks[k].classList.add('filled');
      setTimeout(nextLine, 260);
    } else {
      document.getElementById('startBtn').classList.add('show');
    }
  }
  nextLine();
  document.getElementById('startBtn').addEventListener('click', ()=>{
    Sound.startup();
    document.getElementById('boot').style.opacity='0';
    setTimeout(()=>{ document.getElementById('boot').style.display='none'; }, 650);
    document.getElementById('app').classList.add('ready');
  }, {once:true});
}

--------------------------------------------------------------- */
function init(){
  buildScenery();
  buildIcons();
  buildDock();
  buildHero();
  wireEasterEggs();
  updateCoins(0);
  tickClock(); setInterval(tickClock, 15000);

  const themeToggle = document.getElementById('themeToggle');
  let theme = store.get('pf_theme','auto');
  function applyTheme(){
    if(theme==='night'){ document.body.classList.add('night'); themeToggle.textContent='☾'; }
    else { document.body.classList.remove('night'); themeToggle.textContent='☀'; }
  }
  applyTheme();
  themeToggle.addEventListener('click', ()=>{
    theme = theme==='night' ? 'day' : 'night'; store.set('pf_theme', theme);
    document.body.classList.toggle('night', theme==='night');
    themeToggle.textContent = theme==='night' ? '☾':'☀';
    Sound.click();
  });

  const soundToggle = document.getElementById('soundToggle');
  soundToggle.textContent = Sound.isMuted() ? '🔇' : '🔊';
  soundToggle.addEventListener('click', ()=>{
    const m = Sound.toggleMute(); soundToggle.textContent = m ? '🔇' : '🔊';
    if(!m) Sound.click();
  });

  window.addEventListener('keydown', e=>{
    if(e.key==='Escape'){
      const focused = document.querySelector('.win.focused');
      if(focused) focused.querySelector('.close').click();
    }
  });

  runBoot();
}
if(document.readyState === 'loading'){ document.addEventListener('DOMContentLoaded', init); } else { init(); }

})();
